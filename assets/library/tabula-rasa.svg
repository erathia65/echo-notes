<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="A long aisle of library shelves, vanishing to a single lit lamp in the distance.">
  <title>The empty aisle</title>

  <!-- Background: matches the page -->
