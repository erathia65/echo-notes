    <ellipse cx="600" cy="278" rx="34" ry="12" fill="#f4d889" opacity="0.45"/>
    <ellipse cx="600" cy="280" rx="80" ry="32" fill="#f4d889" opacity="0.22"/>
    <ellipse cx="600" cy="285" rx="160" ry="60" fill="#f4d889" opacity="0.10"/>
  </g>

  <!-- A small empty wooden table in the foreground, very bottom, no books, no lamp -->
  <!-- A low table at center-bottom, x=540..660, y=540..580 -->
  <path d="M 540,560 C 580,558 620,562 660,560" fill="none" stroke="#3a2f24" stroke-width="2" stroke-linecap="round"/>
