  <path d="M 0,290 L 200,310" fill="none" stroke="#3a2f24" stroke-width="1.2" opacity="0.7"/>
  <path d="M 0,380 L 200,396" fill="none" stroke="#3a2f24" stroke-width="1.2" opacity="0.7"/>
  <path d="M 0,470 L 200,478" fill="none" stroke="#3a2f24" stroke-width="1.2" opacity="0.7"/>

