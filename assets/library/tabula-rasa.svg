  <path d="M 590,262 L 610,262 L 608,272 L 592,272 Z" fill="none" stroke="#2a2520" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="592" y1="272" x2="608" y2="272" stroke="#2a2520" stroke-width="1.2" stroke-linecap="round"/>

