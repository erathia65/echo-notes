  <!-- A few unlit lamps on the shelves, hanging down from the top of the aisle -->
  <!-- Two off, on the left and right at the front of the aisle -->
  <line x1="220" y1="200" x2="220" y2="245" stroke="#2a2520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 207,245 L 233,245 L 230,255 L 210,255 Z" fill="none" stroke="#2a2520" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="210" y1="255" x2="230" y2="255" stroke="#2a2520" stroke-width="1.2" stroke-linecap="round"/>

  <line x1="980" y1="200" x2="980" y2="245" stroke="#2a2520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 967,245 L 993,245 L 990,255 L 970,255 Z" fill="none" stroke="#2a2520" stroke-width="1.2" stroke-linejoin="round"/>
