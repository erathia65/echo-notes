<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="A reading nook: armchair, side table with a lamp, and a low bookshelf.">
  <title>The reading nook</title>

  <!-- Background: matches the page -->
  <rect width="1200" height="600" fill="#fafaf7"/>

  <!-- Floor: a slightly imperfect horizontal line, the warm dark of wood -->
  <path d="M 0,485 C 200,486 410,483 620,485 C 830,487 1010,484 1200,486"
        fill="none" stroke="#3a2f24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Faint floor grain, three short strokes -->
  <path d="M 140,505 C 180,506 230,504 270,506" fill="none" stroke="#3a2f24" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M 480,520 C 540,521 610,519 680,521" fill="none" stroke="#3a2f24" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M 820,510 C 880,511 950,509 1010,511" fill="none" stroke="#3a2f24" stroke-width="1" stroke-linecap="round" opacity="0.45"/>

  <!-- Wall accent: a faint suggestion of a picture rail or window-frame line, very high up -->
  <path d="M 380,80 C 470,78 580,82 690,80" fill="none" stroke="#2a2520" stroke-width="1" stroke-linecap="round" opacity="0.18"/>
  <path d="M 720,90 C 800,88 880,92 950,90" fill="none" stroke="#2a2520" stroke-width="1" stroke-linecap="round" opacity="0.15"/>

  <!-- ARMCHAIR (left, x=80..220) -->
  <!-- Back -->
  <path d="M 92,295 C 88,260 96,238 110,228 C 130,218 165,217 188,228 C 202,238 208,260 205,295"
        fill="none" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Seat cushion line -->
  <path d="M 95,360 C 140,358 190,361 210,360" fill="none" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Seat front (curve) -->
  <path d="M 95,360 C 92,380 96,400 102,415 C 105,420 110,422 118,422 L 188,422 C 196,422 201,418 204,412 C 209,395 211,378 210,360"
        fill="none" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left arm -->
  <path d="M 92,295 C 84,310 80,340 82,360 C 84,378 90,395 98,410"
        fill="none" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M 205,295 C 213,310 217,340 215,360 C 213,378 208,395 202,410"
        fill="none" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Front legs -->
  <path d="M 108,422 L 106,485" fill="none" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 198,422 L 200,485" fill="none" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cushion seam -->
  <path d="M 100,380 C 140,378 190,381 208,380" fill="none" stroke="#2a2520" stroke-width="1" stroke-linecap="round" opacity="0.55"/>

  <!-- SIDE TABLE (x=235..315) -->
  <path d="M 235,415 L 235,485" fill="none" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 315,415 L 315,485" fill="none" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 230,415 C 260,412 290,418 320,415" fill="none" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <!-- A small drawer line -->
  <path d="M 245,440 L 305,440" fill="none" stroke="#2a2520" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M 270,440 L 270,455" fill="none" stroke="#2a2520" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- A SINGLE BOOK on the table, accent red -->
  <rect x="248" y="395" width="58" height="18" fill="#8b3a3a" stroke="#2a2520" stroke-width="1.2"/>
  <line x1="255" y1="404" x2="298" y2="404" stroke="#2a2520" stroke-width="0.8" opacity="0.6"/>

  <!-- READING LAMP on the table, x≈260..290, lamp shade is the accent red -->
  <!-- Base -->
  <ellipse cx="280" cy="395" rx="14" ry="3" fill="none" stroke="#2a2520" stroke-width="1.5"/>
  <!-- Stem -->
  <line x1="280" y1="395" x2="280" y2="350" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Shade: trapezoid in accent red -->
  <path d="M 264,350 L 296,350 L 304,322 L 256,322 Z" fill="#8b3a3a" stroke="#2a2520" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Shade top -->
  <line x1="256" y1="322" x2="304" y2="322" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <!-- LAMP GLOW (animated) -->
  <g class="lamp-glow">
    <!-- Inner halo, warmest -->
    <ellipse cx="280" cy="330" rx="58" ry="22" fill="#f4d889" opacity="0.35"/>
    <!-- Outer halo, softer -->
    <ellipse cx="280" cy="335" rx="110" ry="48" fill="#f4d889" opacity="0.18"/>
  </g>

  <!-- A small throw / folded cloth on the armchair seat (parchment color) -->
  <path d="M 120,378 C 140,372 175,376 200,374 C 200,382 196,392 192,400 C 168,402 138,400 120,398 Z"
        fill="#e8e4d8" stroke="#2a2520" stroke-width="1" opacity="0.9"/>

  <!-- LOW BOOKSHELF on the right (x=820..1170) -->
  <!-- Top of shelf -->
  <path d="M 820,260 L 1170,260" fill="none" stroke="#3a2f24" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom of shelf -->
  <path d="M 820,470 L 1170,470" fill="none" stroke="#3a2f24" stroke-width="2" stroke-linecap="round"/>
  <!-- Middle shelf -->
  <path d="M 820,365 L 1170,365" fill="none" stroke="#3a2f24" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left side -->
  <path d="M 820,260 L 820,470" fill="none" stroke="#3a2f24" stroke-width="2" stroke-linecap="round"/>
  <!-- Right side -->
  <path d="M 1170,260 L 1170,470" fill="none" stroke="#3a2f24" stroke-width="2" stroke-linecap="round"/>
  <!-- Shelf feet -->
  <path d="M 830,470 L 830,490" fill="none" stroke="#3a2f24" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 1160,470 L 1160,490" fill="none" stroke="#3a2f24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Books on upper shelf (y=265..360), 18 spines -->
  <g stroke="#2a2520" stroke-width="1" stroke-linejoin="round">
    <rect x="828"  y="270" width="14" height="92" fill="#2c3e50"/>
    <rect x="844"  y="276" width="11" height="86" fill="#3d3a4a"/>
    <rect x="857"  y="272" width="16" height="90" fill="#4a3c2a"/>
    <rect x="875"  y="280" width="10" height="82" fill="#2c3e50"/>
    <rect x="887"  y="270" width="14" height="92" fill="#5d4a3a"/>
    <rect x="903"  y="278" width="12" height="84" fill="#3d3a4a"/>
    <rect x="917"  y="272" width="15" height="90" fill="#4a3c2a"/>
    <rect x="934"  y="284" width="9"  height="78" fill="#2c3e50"/>
    <rect x="945"  y="270" width="14" height="92" fill="#5d4a3a"/>
    <rect x="961"  y="280" width="11" height="82" fill="#3d3a4a"/>
    <rect x="974"  y="274" width="13" height="88" fill="#4a3c2a"/>
    <rect x="989"  y="282" width="10" height="80" fill="#2c3e50"/>
    <rect x="1001" y="270" width="14" height="92" fill="#8b3a3a"/> <!-- accent red book -->
    <rect x="1017" y="278" width="12" height="84" fill="#3d3a4a"/>
    <rect x="1031" y="272" width="15" height="90" fill="#5d4a3a"/>
    <rect x="1048" y="280" width="10" height="82" fill="#2c3e50"/>
    <rect x="1060" y="274" width="14" height="88" fill="#4a3c2a"/>
    <rect x="1076" y="282" width="11" height="80" fill="#3d3a4a"/>
    <rect x="1089" y="276" width="13" height="86" fill="#2c3e50"/>
    <rect x="1104" y="270" width="14" height="92" fill="#5d4a3a"/>
    <rect x="1120" y="282" width="10" height="80" fill="#3d3a4a"/>
    <rect x="1132" y="276" width="13" height="86" fill="#4a3c2a"/>
    <rect x="1147" y="284" width="9"  height="78" fill="#2c3e50"/>
    <rect x="1158" y="272" width="10" height="90" fill="#8b3a3a"/> <!-- second accent red book -->
  </g>
  <!-- A few horizontal-leaning books to suggest a personal collection -->
  <rect x="900" y="350" width="48" height="10" fill="#4a3c2a" stroke="#2a2520" stroke-width="1" transform="rotate(-2 924 355)"/>
  <rect x="1050" y="350" width="42" height="10" fill="#3d3a4a" stroke="#2a2520" stroke-width="1" transform="rotate(1 1071 355)"/>

  <!-- Books on lower shelf (y=370..465), 16 spines, slightly different palette bias -->
  <g stroke="#2a2520" stroke-width="1" stroke-linejoin="round">
    <rect x="828"  y="378" width="13" height="88" fill="#3d3a4a"/>
    <rect x="843"  y="384" width="15" height="82" fill="#5d4a3a"/>
    <rect x="860"  y="378" width="11" height="88" fill="#2c3e50"/>
    <rect x="873"  y="388" width="13" height="78" fill="#4a3c2a"/>
    <rect x="888"  y="380" width="14" height="86" fill="#2c3e50"/>
    <rect x="904"  y="386" width="11" height="80" fill="#5d4a3a"/>
    <rect x="917"  y="378" width="14" height="88" fill="#3d3a4a"/>
    <rect x="933"  y="390" width="10" height="76" fill="#4a3c2a"/>
    <rect x="945"  y="382" width="13" height="84" fill="#2c3e50"/>
    <rect x="960"  y="378" width="14" height="88" fill="#5d4a3a"/>
    <rect x="976"  y="388" width="11" height="78" fill="#3d3a4a"/>
    <rect x="989"  y="380" width="14" height="86" fill="#4a3c2a"/>
    <rect x="1005" y="386" width="12" height="80" fill="#2c3e50"/>
    <rect x="1019" y="378" width="14" height="88" fill="#3d3a4a"/>
    <rect x="1035" y="384" width="11" height="82" fill="#5d4a3a"/>
    <rect x="1048" y="378" width="14" height="88" fill="#2c3e50"/>
    <rect x="1064" y="390" width="10" height="76" fill="#4a3c2a"/>
    <rect x="1076" y="382" width="13" height="84" fill="#3d3a4a"/>
    <rect x="1091" y="378" width="14" height="88" fill="#5d4a3a"/>
    <rect x="1107" y="386" width="12" height="80" fill="#2c3e50"/>
    <rect x="1121" y="380" width="13" height="86" fill="#4a3c2a"/>
    <rect x="1136" y="388" width="11" height="78" fill="#3d3a4a"/>
    <rect x="1149" y="378" width="14" height="88" fill="#2c3e50"/>
  </g>
  <!-- A stack of two horizontal books on the lower shelf, parchment-toned -->
  <rect x="1085" y="448" width="60" height="14" fill="#e8e4d8" stroke="#2a2520" stroke-width="1"/>
  <rect x="1090" y="434" width="50" height="12" fill="#e8e4d8" stroke="#2a2520" stroke-width="1"/>
  <line x1="1095" y1="440" x2="1135" y2="440" stroke="#2a2520" stroke-width="0.8" opacity="0.5"/>

  <!-- FLOOR LAMP at the far right (x=1140..1185, mostly silhouette) -->
  <line x1="1170" y1="490" x2="1170" y2="270" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="1170" cy="490" rx="20" ry="4" fill="none" stroke="#2a2520" stroke-width="1.5"/>
  <path d="M 1150,270 L 1190,270 L 1185,255 L 1155,255 Z" fill="none" stroke="#2a2520" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="1155" y1="255" x2="1185" y2="255" stroke="#2a2520" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Floor lamp is OFF, no glow -->

  <!-- A tiny detail: a slipper / paper on the floor near the armchair -->
  <path d="M 230,495 C 244,490 262,492 274,498 C 270,504 252,506 232,502 Z"
        fill="none" stroke="#2a2520" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
</svg>
