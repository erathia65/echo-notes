<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="The entrance hall of the library: a wide aisle, three lamps in the distance, two walls of shelves.">
  <title>The entrance hall</title>

  <!-- Page background -->
  <rect width="1200" height="600" fill="#fafaf7"/>

  <!-- Floor: a soft, slightly imperfect horizontal line -->
  <path d="M 0,540 C 200,541 410,539 620,540 C 830,542 1010,539 1200,541"
        fill="none" stroke="#3a2f24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Two long shelf walls, perspective converging toward (600, 200) — upper center, not middle -->
  <!-- LEFT WALL -->
  <!-- Outer (left) edge of the left wall -->
  <path d="M 0,150 L 0,540" fill="none" stroke="#3a2f24" stroke-width="2" stroke-linecap="round"/>
  <!-- Top edge of the left wall, receding to vanishing point -->
  <path d="M 0,150 L 580,200" fill="none" stroke="#3a2f24" stroke-width="2"/>
  <!-- Bottom edge of the left wall (the front of the lowest shelf), receding to vanishing point -->
  <path d="M 0,540 L 580,200" fill="none" stroke="#3a2f24" stroke-width="2"/>
  <!-- The inside (right) edge of the left wall, where it meets the aisle -->
  <path d="M 320,150 L 580,200" fill="none" stroke="#3a2f24" stroke-width="1.5" opacity="0.85"/>
  <!-- Shelf dividers on the left wall, three recede lines -->
  <path d="M 0,260 L 460,242" fill="none" stroke="#3a2f24" stroke-width="1.2" opacity="0.7"/>
  <path d="M 0,360 L 480,272" fill="none" stroke="#3a2f24" stroke-width="1.2" opacity="0.7"/>
  <path d="M 0,460 L 510,308" fill="none" stroke="#3a2f24" stroke-width="1.2" opacity="0.7"/>

  <!-- RIGHT WALL (mirrored) -->
  <path d="M 1200,150 L 1200,540" fill="none" stroke="#3a2f24" stroke-width="2" stroke-linecap="round"/>
  <path d="M 1200,150 L 620,200" fill="none" stroke="#3a2f24" stroke-width="2"/>
  <path d="M 1200,540 L 620,200" fill="none" stroke="#3a2f24" stroke-width="2"/>
  <path d="M 880,150 L 620,200" fill="none" stroke="#3a2f24" stroke-width="1.5" opacity="0.85"/>
  <path d="M 1200,260 L 740,242" fill="none" stroke="#3a2f24" stroke-width="1.2" opacity="0.7"/>
  <path d="M 1200,360 L 720,272" fill="none" stroke="#3a2f24" stroke-width="1.2" opacity="0.7"/>
  <path d="M 1200,460 L 690,308" fill="none" stroke="#3a2f24" stroke-width="1.2" opacity="0.7"/>

  <!-- Books on the LEFT WALL, four bands (perspective squashed near the top) -->
  <g stroke="#2a2520" stroke-width="0.8" stroke-linejoin="round">
    <!-- Top band, near vanishing point -->
    <polygon points="320,180 360,184 360,196 320,192" fill="#3d3a4a"/>
    <polygon points="362,184 396,187 396,199 362,196" fill="#2c3e50"/>
    <polygon points="398,187 430,189 430,201 398,199" fill="#4a3c2a"/>
    <polygon points="432,189 462,191 462,203 432,201" fill="#5d4a3a"/>
    <polygon points="464,191 490,192 490,204 464,203" fill="#2c3e50"/>
    <polygon points="492,192 514,193 514,205 490,204" fill="#3d3a4a"/>
    <polygon points="516,193 536,194 536,206 514,205" fill="#4a3c2a"/>
    <polygon points="538,194 554,194 554,206 536,206" fill="#2c3e50"/>
    <polygon points="556,194 570,195 570,207 554,206" fill="#3d3a4a"/>
    <polygon points="572,195 580,195 580,207 570,207" fill="#4a3c2a"/>

    <!-- Second band -->
    <polygon points="240,228 290,232 290,256 240,252" fill="#2c3e50"/>
    <polygon points="292,232 335,236 335,260 292,256" fill="#4a3c2a"/>
    <polygon points="337,236 375,239 375,263 335,260" fill="#3d3a4a"/>
    <polygon points="377,239 410,242 410,266 375,263" fill="#5d4a3a"/>
    <polygon points="412,242 440,244 440,268 410,266" fill="#2c3e50"/>
    <polygon points="442,244 466,246 466,270 440,268" fill="#3d3a4a"/>
    <polygon points="468,246 488,247 488,271 466,270" fill="#4a3c2a"/>
    <polygon points="490,247 506,248 506,272 488,271" fill="#2c3e50"/>
    <polygon points="508,248 522,249 522,273 506,272" fill="#3d3a4a"/>
    <polygon points="524,249 536,249 536,273 522,273" fill="#4a3c2a"/>
    <polygon points="538,249 548,250 548,274 536,273" fill="#2c3e50"/>
    <polygon points="550,250 560,250 560,274 548,274" fill="#3d3a4a"/>
    <polygon points="562,250 572,250 572,274 560,274" fill="#4a3c2a"/>
    <!-- One accent red book on the left wall, periphery -->
    <polygon points="262,229 290,231 290,255 262,253" fill="#8b3a3a"/>

    <!-- Third band -->
    <polygon points="160,318 220,322 220,360 160,354" fill="#4a3c2a"/>
    <polygon points="222,322 280,326 280,364 222,360" fill="#2c3e50"/>
    <polygon points="282,326 335,330 335,368 280,364" fill="#3d3a4a"/>
    <polygon points="337,330 385,333 385,371 335,368" fill="#5d4a3a"/>
    <polygon points="387,333 430,336 430,374 385,371" fill="#2c3e50"/>
    <polygon points="432,336 470,339 470,377 430,374" fill="#3d3a4a"/>
    <polygon points="472,339 504,341 504,379 470,377" fill="#4a3c2a"/>
    <polygon points="506,341 534,343 534,381 504,379" fill="#2c3e50"/>
    <polygon points="536,343 558,344 558,382 534,381" fill="#3d3a4a"/>
    <polygon points="560,344 578,345 578,383 558,382" fill="#4a3c2a"/>

    <!-- Bottom band, near the front of the left wall -->
    <polygon points="0,440 90,444 90,540 0,540" fill="#2c3e50"/>
    <polygon points="92,444 175,448 175,540 92,540" fill="#4a3c2a"/>
    <polygon points="177,448 250,452 250,540 177,540" fill="#3d3a4a"/>
    <polygon points="252,452 320,455 320,540 250,540" fill="#5d4a3a"/>
    <polygon points="322,455 385,458 385,540 320,540" fill="#2c3e50"/>
    <polygon points="387,458 445,460 445,540 385,540" fill="#3d3a4a"/>
    <polygon points="447,460 498,462 498,540 445,540" fill="#4a3c2a"/>
    <polygon points="500,462 540,463 540,540 498,540" fill="#2c3e50"/>
    <polygon points="542,463 572,464 572,540 540,540" fill="#3d3a4a"/>
    <polygon points="574,464 595,464 595,540 572,540" fill="#4a3c2a"/>
    <polygon points="597,464 612,464 612,540 595,540" fill="#2c3e50"/>
    <polygon points="614,464 624,465 624,540 612,540" fill="#3d3a4a"/>
  </g>

  <!-- Books on the RIGHT WALL, mirrored perspective -->
  <g stroke="#2a2520" stroke-width="0.8" stroke-linejoin="round">
    <!-- Top band -->
    <polygon points="880,180 840,184 840,196 880,192" fill="#4a3c2a"/>
    <polygon points="838,184 804,187 804,199 838,196" fill="#3d3a4a"/>
    <polygon points="802,187 770,189 770,201 802,199" fill="#5d4a3a"/>
    <polygon points="768,189 738,191 738,203 768,201" fill="#2c3e50"/>
    <polygon points="736,191 710,192 710,204 738,203" fill="#3d3a4a"/>
    <polygon points="708,192 686,193 686,205 710,204" fill="#4a3c2a"/>
    <polygon points="684,193 664,194 664,206 686,205" fill="#2c3e50"/>
    <polygon points="662,194 646,194 646,206 664,206" fill="#3d3a4a"/>
    <polygon points="644,194 630,195 630,207 646,206" fill="#4a3c2a"/>
    <polygon points="628,195 620,195 620,207 630,207" fill="#2c3e50"/>

    <!-- Second band -->
    <polygon points="960,228 910,232 910,256 960,252" fill="#3d3a4a"/>
    <polygon points="908,232 865,236 865,260 908,256" fill="#2c3e50"/>
    <polygon points="863,236 825,239 825,263 863,260" fill="#4a3c2a"/>
    <polygon points="823,239 790,242 790,266 825,263" fill="#3d3a4a"/>
    <polygon points="788,242 760,244 760,268 790,266" fill="#5d4a3a"/>
    <polygon points="758,244 734,246 734,270 760,268" fill="#2c3e50"/>
    <polygon points="732,246 712,247 712,271 734,270" fill="#3d3a4a"/>
    <polygon points="710,247 694,248 694,272 712,271" fill="#4a3c2a"/>
    <polygon points="692,248 678,249 678,273 694,272" fill="#2c3e50"/>
    <polygon points="676,249 664,249 664,273 678,273" fill="#3d3a4a"/>
    <polygon points="662,249 652,250 652,274 664,273" fill="#4a3c2a"/>
    <polygon points="650,250 640,250 640,274 652,274" fill="#2c3e50"/>
    <polygon points="638,250 628,250 628,274 640,274" fill="#3d3a4a"/>
    <!-- One accent red book on the right wall, periphery -->
    <polygon points="938,229 910,231 910,255 938,253" fill="#8b3a3a"/>

    <!-- Third band -->
    <polygon points="1040,318 980,322 980,360 1040,354" fill="#3d3a4a"/>
    <polygon points="978,322 920,326 920,364 978,360" fill="#2c3e50"/>
    <polygon points="918,326 865,330 865,368 920,364" fill="#4a3c2a"/>
    <polygon points="863,330 815,333 815,371 865,368" fill="#3d3a4a"/>
    <polygon points="813,333 770,336 770,374 815,371" fill="#5d4a3a"/>
    <polygon points="768,336 730,339 730,377 770,374" fill="#2c3e50"/>
    <polygon points="728,339 696,341 696,379 730,377" fill="#3d3a4a"/>
    <polygon points="694,341 666,343 666,381 696,379" fill="#4a3c2a"/>
    <polygon points="664,343 642,344 642,382 666,381" fill="#2c3e50"/>
    <polygon points="640,344 622,345 622,383 642,382" fill="#3d3a4a"/>

    <!-- Bottom band, near the front of the right wall -->
    <polygon points="1200,440 1110,444 1110,540 1200,540" fill="#3d3a4a"/>
    <polygon points="1108,444 1025,448 1025,540 1108,540" fill="#2c3e50"/>
    <polygon points="1023,448 950,452 950,540 1023,540" fill="#4a3c2a"/>
    <polygon points="948,452 880,455 880,540 948,540" fill="#3d3a4a"/>
    <polygon points="878,455 815,458 815,540 878,540" fill="#5d4a3a"/>
    <polygon points="813,458 755,460 755,540 813,540" fill="#2c3e50"/>
    <polygon points="753,460 702,462 702,540 755,540" fill="#3d3a4a"/>
    <polygon points="700,462 660,463 660,540 702,540" fill="#4a3c2a"/>
    <polygon points="658,463 628,464 628,540 660,540" fill="#2c3e50"/>
    <polygon points="626,464 605,464 605,540 628,540" fill="#3d3a4a"/>
    <polygon points="603,464 588,464 588,540 605,540" fill="#4a3c2a"/>
    <polygon points="586,464 576,465 576,540 588,540" fill="#2c3e50"/>
  </g>

  <!-- THREE LAMPS, in a row near the vanishing point at y=200 -->
  <!-- Left lamp: off, silhouette -->
  <line x1="500" y1="150" x2="500" y2="200" stroke="#2a2520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 487,200 L 513,200 L 510,210 L 490,210 Z" fill="none" stroke="#2a2520" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="490" y1="210" x2="510" y2="210" stroke="#2a2520" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Center lamp: LIT, animated. Slightly larger and lower than the flanking lamps (closer to the viewer's eye in the perspective) -->
  <line x1="600" y1="150" x2="600" y2="218" stroke="#2a2520" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M 584,218 L 616,218 L 613,232 L 587,232 Z" fill="none" stroke="#2a2520" stroke-width="1.4" stroke-linejoin="round"/>
  <line x1="587" y1="232" x2="613" y2="232" stroke="#2a2520" stroke-width="1.4" stroke-linecap="round"/>

  <!-- LAMP GLOW on the center lamp, animated -->
  <g class="lamp-glow">
    <ellipse cx="600" cy="240" rx="42" ry="14" fill="#f4d889" opacity="0.45"/>
    <ellipse cx="600" cy="244" rx="100" ry="38" fill="#f4d889" opacity="0.22"/>
    <ellipse cx="600" cy="252" rx="200" ry="80" fill="#f4d889" opacity="0.10"/>
  </g>

  <!-- Right lamp: off, silhouette -->
  <line x1="700" y1="150" x2="700" y2="200" stroke="#2a2520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 687,200 L 713,200 L 710,210 L 690,210 Z" fill="none" stroke="#2a2520" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="690" y1="210" x2="710" y2="210" stroke="#2a2520" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Floor: a few subtle horizontal lines suggesting wooden planks, fading into the perspective -->
  <path d="M 200,560 L 580,540" fill="none" stroke="#3a2f24" stroke-width="0.8" opacity="0.4"/>
  <path d="M 620,540 L 1000,560" fill="none" stroke="#3a2f24" stroke-width="0.8" opacity="0.4"/>
  <path d="M 280,510 C 380,500 470,490 560,484" fill="none" stroke="#3a2f24" stroke-width="0.6" opacity="0.3"/>
  <path d="M 640,484 C 730,490 820,500 920,510" fill="none" stroke="#3a2f24" stroke-width="0.6" opacity="0.3"/>

  <!-- Faint suggestion of a transom / archway at the vanishing point, the "entrance" -->
  <path d="M 540,200 C 560,180 600,170 600,170 C 600,170 640,180 660,200" fill="none" stroke="#2a2520" stroke-width="1" opacity="0.35"/>
</svg>
